# Render 一键部署配置 - 部署后在浏览器打开即可使用
# 使用方式：将本仓库推送到 GitHub，在 https://dashboard.render.com 选择 New -> Web Service，连接仓库并选择此文件
services:
  - type: web
    name: payment-app
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
